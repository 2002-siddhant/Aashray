<!DOCTYPE html>
<html>
<head>
    <title>Read File</title>
</head>
<body>

<input type="file" id="fileInput" />
<h1>Uploaded file content</h1><hr><br>
<p id="content"></p><hr>

No of Words:
<h1 id="words"></h1><hr>
No of Sentences:
<h1 id="sentences"></h1><hr>
Longest Sentence
<h1 id="longestsentence"></h1><hr>
No of characterCount
<h1 id="characterCount"></h1><hr>

<script>
    const fileInput = document.getElementById("fileInput");

    fileInput.addEventListener("change", function () {
        const file = fileInput.files[0];

        const reader = new FileReader();

        reader.onload = function (event) {
            const text = event.target.result;
            const content = document.getElementById("content").innerText = text;
            

            document.getElementById("characterCount").innerText = text.length
            

            

            const words = text.trim().split(/\s+/);
            const wordCount = words.filter(word => word.length > 0).length;
            document.getElementById("words").innerText = wordCount

            
            const sentences = text
                .split(/[.!?]+/)
                .map(s => s.trim())
                .filter(s => s.length > 0);

            const sentenceCount = sentences.length;
            document.getElementById("sentences").innerText = sentenceCount

            
            let longestSentence = "";
            for (let sentence of sentences) {
                if (sentence.length > longestSentence.length) {
                    longestSentence = sentence;
                }
            }
            document.getElementById("longestsentence").innerText = longestSentence

            
        };

        reader.readAsText(file);
    });
</script>

</body>
</html>
